<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추첨기</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>행운의 로또 번호 추첨기</h1>
            <p>버튼을 눌러 당신의 행운 번호를 확인하세요!</p>
        </header>
        <main>
            <div class="lotto-display" id="lotto-display">
                <!-- 번호가 여기에 표시됩니다 -->
            </div>
            <button class="generate-btn" id="generate-btn">번호 추첨하기</button>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
